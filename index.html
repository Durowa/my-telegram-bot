<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fearless Miner ⛏️ $Fear</title>
  <!-- Telegram Web App Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      /* Cyber-Punk Dark Theme с улучшенными переменными */
      --bg-deep: #0a0a0c;
      --card-glass: rgba(18, 18, 24, 0.65);
      --neon-gold: #f0b90b;
      --neon-cyan: #00e5ff;
      --danger: #ff4d6d;
      --text-primary: #f5f5f7;
      --text-secondary: #a0a0b0;
      --border-glow: 0 0 15px rgba(240, 185, 11, 0.2);
      --font-mono: 'SF Mono', 'Courier New', monospace;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --hacker-green: #0f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background: var(--bg-deep);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
      position: relative;
      background-image: radial-gradient(circle at 30% 40%, rgba(240,185,11,0.08) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(0,229,255,0.06) 0%, transparent 40%);
    }

    .particle-field {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .dust {
      position: absolute;
      background: rgba(240, 185, 11, 0.5);
      border-radius: 50%;
      box-shadow: 0 0 12px #f0b90b;
      animation: floatDust 8s infinite ease-in-out;
    }
    @keyframes floatDust {
      0% { transform: translateY(0px) scale(0.8); opacity: 0.2; }
      50% { opacity: 0.7; transform: translateY(-30px) scale(1.4); }
      100% { transform: translateY(0px) scale(0.8); opacity: 0.2; }
    }

    .glass-card {
      background: var(--card-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(240, 185, 11, 0.25);
      border-radius: var(--radius-xl);
      box-shadow: var(--border-glow), 0 20px 35px rgba(0,0,0,0.6);
      padding: 16px;
      margin: 10px 16px;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      z-index: 5;
      position: relative;
      padding-top: env(safe-area-inset-top);
    }

    .balance-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      background: rgba(10,10,14,0.8);
      backdrop-filter: blur(25px);
      border-bottom: 1px solid rgba(240,185,11,0.3);
    }
    .token-amount {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f0b90b, #ffdb7c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .profit-per-hour {
      font-size: 0.85rem;
      color: #00e5ff;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .energy-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .energy-fill {
      height: 10px;
      background: linear-gradient(90deg, #00e5ff, #3a86ff);
      border-radius: 20px;
      width: 85%;
      box-shadow: 0 0 18px #00e5ff;
      transition: width 0.2s ease;
    }

    .miner-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 10px;
    }
    .character-container {
      position: relative;
      width: 200px;
      height: 220px;
      margin-bottom: 20px;
    }
    .char-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
    }
    .char-placeholder {
      width: 180px; height: 180px;
      background: radial-gradient(circle at 30% 30%, #b0b0b0, #2c2c2c);
      border-radius: 45% 45% 40% 40%;
      position: relative;
      margin: 0 auto;
      box-shadow: 0 0 25px rgba(240,185,11,0.5);
    }
    .char-placeholder::before {
      content: "🦡";
      font-size: 6rem;
      position: absolute;
      top: 15px; left: 35px;
    }

    .rock-button {
      background: radial-gradient(circle at 40% 30%, #5a4a3a, #1f1a15);
      width: 130px; height: 130px;
      border-radius: 40% 50% 45% 55%;
      box-shadow: 0 20px 35px rgba(0,0,0,0.9), inset 0 -8px 0 rgba(0,0,0,0.7), 0 0 35px #f0b90b;
      border: 2px solid #b8860b;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.08s, box-shadow 0.08s;
      cursor: pointer;
      font-size: 2.5rem; font-weight: bold; color: #f0b90b;
      text-shadow: 0 0 15px black;
    }
    .rock-button:active { transform: scale(0.92); box-shadow: 0 10px 20px black, inset 0 -4px 0 black; }
    .shake { animation: shakeAnim 0.15s ease-in-out; }
    @keyframes shakeAnim {
      0%{transform:translateX(0)} 25%{transform:translateX(-7px)} 50%{transform:translateX(7px)} 75%{transform:translateX(-4px)} 100%{transform:translateX(0)}
    }

    .float-text {
      position: absolute; font-weight: bold; font-size: 1.8rem;
      color: #f0b90b; text-shadow: 0 0 20px #f0b90b;
      animation: riseUp 0.7s forwards; pointer-events: none; z-index: 20;
    }
    @keyframes riseUp {
      0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)}
    }

    .nav-tabs {
      display: flex; justify-content: space-around;
      background: rgba(20,20,30,0.8); backdrop-filter: blur(20px);
      border-top: 1px solid rgba(240,185,11,0.3);
      padding: 10px 0 env(safe-area-inset-bottom);
    }
    .nav-btn {
      background: transparent; border: none; color: #aaa;
      font-size: 1rem; font-weight: 600; padding: 8px 12px;
      border-radius: 30px; transition: 0.2s; display: flex; align-items: center; gap: 4px;
    }
    .nav-btn.active {
      background: rgba(240,185,11,0.2); color: #f0b90b;
      box-shadow: 0 0 15px rgba(240,185,11,0.4);
    }

    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; width: 100%; max-height: 70vh;
      background: rgba(10,10,18,0.95); backdrop-filter: blur(30px);
      border-top: 2px solid #f0b90b; border-radius: 32px 32px 0 0;
      padding: 20px; z-index: 100;
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .skin-card, .upgrade-card, .friend-card {
      background: rgba(30,30,40,0.7); backdrop-filter: blur(12px);
      border-radius: 18px; padding: 14px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .buy-btn {
      background: #f0b90b; border: none; color: #0a0a0c;
      font-weight: bold; padding: 8px 20px; border-radius: 25px; cursor: pointer;
    }
    .owned-badge { color: #00e5ff; font-weight: bold; }

    /* Хакерская админка */
    .hacker-console {
      background: #0a0a0a; border: 2px solid #0f0; box-shadow: 0 0 25px #0f0;
      color: #0f0; font-family: 'Courier New', monospace;
    }
    .admin-gear {
      position: fixed; top: 15px; right: 15px;
      background: rgba(0,0,0,0.7); border: 1px solid gold;
      border-radius: 50%; width: 38px; height: 38px;
      font-size: 20px; z-index: 200;
      display: none; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .admin-btn {
      background: #111; border: 1px solid #0f0; color: #0f0;
      padding: 10px; margin: 5px 0; width: 100%; text-align: left;
      font-family: monospace; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="particle-field" id="particleField"></div>

  <div class="app-container" id="app">
    <div class="admin-gear" id="adminGearBtn">⚙️</div>

    <!-- Баланс -->
    <div class="balance-panel glass-card" style="margin-top:5px;">
      <div>
        <div style="font-size:0.9rem; color:#aaa;">$Fear Balance</div>
        <div class="token-amount" id="balanceDisplay">0.00</div>
        <div class="profit-per-hour"><span>⛏️</span> <span id="ppsDisplay">0</span>/сек</div>
      </div>
      <div style="text-align:right;">
        <div>⚡ Энергия</div>
        <div class="energy-bar">
          <div class="energy-fill" id="energyFill" style="width:100%"></div>
          <span id="energyText">100/100</span>
        </div>
        <div style="font-size:0.8rem; color:#00e5ff;" id="skinName">Worker</div>
      </div>
    </div>

    <!-- Майнинг зона -->
    <div class="miner-area">
      <div class="character-container" id="characterContainer">
        <img class="char-layer" id="layerBody" src="" alt="body" onerror="this.style.display='none'">
        <img class="char-layer" id="layerOutfit" src="" alt="outfit" onerror="this.style.display='none'">
        <img class="char-layer" id="layerTool" src="" alt="tool" onerror="this.style.display='none'">
        <div class="char-placeholder" id="charPlaceholder"></div>
      </div>
      <div class="rock-button" id="rockButton">💎</div>
    </div>

    <!-- Навигация -->
    <div class="nav-tabs">
      <button class="nav-btn active" id="tabMine">⛏️ Майнинг</button>
      <button class="nav-btn" id="tabSkins">🧥 Скины</button>
      <button class="nav-btn" id="tabUpgrades">📈 Буры</button>
      <button class="nav-btn" id="tabFriends">👥 Friends</button>
    </div>

    <!-- Скины Sheet -->
    <div class="bottom-sheet" id="skinsSheet">
      <h3 style="color:#f0b90b; margin-bottom:15px;">🎭 Гардероб Медоеда</h3>
      <div id="skinsContainer"></div>
    </div>

    <!-- Улучшения Sheet -->
    <div class="bottom-sheet" id="upgradesSheet">
      <h3 style="color:#f0b90b;">⚙️ Авто-буры</h3>
      <div id="upgradesContainer"></div>
    </div>

    <!-- Друзья Sheet -->
    <div class="bottom-sheet" id="friendsSheet">
      <h3 style="color:#f0b90b;">👥 Реферальная система</h3>
      <p style="margin:10px 0;">Получай <strong>5,000 $Fear</strong> за каждого приглашенного шахтера!</p>
      <button class="buy-btn" id="inviteFriendBtn" style="width:100%; margin:10px 0;">📤 Пригласить друга</button>
      <div style="margin-top:15px;">
        <h4>Твои рефералы (заглушка):</h4>
        <div id="referralsList">
          <div class="friend-card">👤 Miner_01 · +5000 $Fear</div>
          <div class="friend-card">👤 CryptoBadger · +5000 $Fear</div>
        </div>
      </div>
    </div>

    <!-- Админская хакерская консоль -->
    <div class="bottom-sheet hacker-console" id="adminSheet">
      <h3 style="color:#0f0;">🔧 ADMIN CONSOLE</h3>
      <button class="admin-btn" id="adminAdd1M">[+] ADD 1M $Fear</button>
      <button class="admin-btn" id="adminUnlockSkins">[🔓] UNLOCK ALL SKINS</button>
      <button class="admin-btn" id="adminResetBalance" style="border-color:#ff4d6d; color:#ff4d6d;">[⚠] RESET BALANCE</button>
    </div>
  </div>

  <script>
    (function() {
      // ---------- TELEGRAM INIT ----------
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      // ---------- АДМИН ID (ВСТАВЬ СВОЙ) ----------
      const ADMIN_ID = "ТВОЙ_ID_ТУТ"; // <-- ЗАМЕНИ НА СВОЙ TELEGRAM USER ID

      // ---------- СОСТОЯНИЕ ----------
      const gameState = {
        balance: 0.0,
        energy: 100,
        maxEnergy: 100,
        equippedSkin: 'worker',
        ownedSkins: ['worker'],
        upgrades: {
          drill1: { level: 0, baseCost: 50, profitPerSec: 1, owned: false },
          drill2: { level: 0, baseCost: 500, profitPerSec: 5, owned: false }
        },
        skinMultiplier: 1,
        referrals: 0,
        lastSave: Date.now()
      };

      const skinData = {
        worker: { name: 'Worker', multiplier: 1, cost: 0, emoji: '👷' },
        cyberBadger: { name: 'Cyber Badger', multiplier: 2, cost: 150, emoji: '🦡⚡' },
        goldenKing: { name: 'Golden King', multiplier: 10, cost: 5000, emoji: '👑' }
      };

      // DOM элементы
      const balanceEl = document.getElementById('balanceDisplay');
      const ppsEl = document.getElementById('ppsDisplay');
      const energyFill = document.getElementById('energyFill');
      const energyText = document.getElementById('energyText');
      const rockBtn = document.getElementById('rockButton');
      const skinNameEl = document.getElementById('skinName');
      const skinsSheet = document.getElementById('skinsSheet');
      const upgradesSheet = document.getElementById('upgradesSheet');
      const friendsSheet = document.getElementById('friendsSheet');
      const adminSheet = document.getElementById('adminSheet');
      const adminGearBtn = document.getElementById('adminGearBtn');

      function saveGame() { localStorage.setItem('fearlessMiner', JSON.stringify(gameState)); }
      function loadGame() {
        const saved = localStorage.getItem('fearlessMiner');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            gameState.balance = data.balance || 0;
            gameState.energy = data.energy ?? 100;
            gameState.ownedSkins = data.ownedSkins || ['worker'];
            gameState.equippedSkin = data.equippedSkin || 'worker';
            gameState.upgrades = data.upgrades || gameState.upgrades;
            gameState.referrals = data.referrals || 0;
            const skin = skinData[gameState.equippedSkin];
            gameState.skinMultiplier = skin ? skin.multiplier : 1;
          } catch(e){}
        }
      }

      function updateUI() {
        balanceEl.textContent = gameState.balance.toFixed(2);
        const totalPps = calculateTotalPps();
        ppsEl.textContent = totalPps.toFixed(1);
        energyFill.style.width = `${(gameState.energy/gameState.maxEnergy)*100}%`;
        energyText.textContent = `${Math.floor(gameState.energy)}/${gameState.maxEnergy}`;
        skinNameEl.textContent = skinData[gameState.equippedSkin]?.name || 'Worker';
        if (!document.getElementById('layerBody').src || document.getElementById('layerBody').src === window.location.href) {
          document.getElementById('charPlaceholder').style.display = 'block';
        }
      }

      function calculateTotalPps() {
        let sum = 0;
        for (let key in gameState.upgrades) {
          if (gameState.upgrades[key].owned) sum += gameState.upgrades[key].profitPerSec;
        }
        return sum;
      }

      function heavyHaptic() { if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); }
      function notificationHaptic() { if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); }

      function handleMiningClick(e) {
        if (gameState.energy < 1) return;
        gameState.energy = Math.max(0, gameState.energy - 1);
        const earned = 1 * gameState.skinMultiplier;
        gameState.balance += earned;
        heavyHaptic();
        rockBtn.classList.add('shake');
        setTimeout(() => rockBtn.classList.remove('shake'), 150);
        const rect = rockBtn.getBoundingClientRect();
        spawnFloatText(rect.left + rect.width/2 - 20, rect.top, `+${earned} $Fear`);
        saveGame(); updateUI();
      }

      function spawnFloatText(x, y, text) {
        const el = document.createElement('div');
        el.className = 'float-text';
        el.textContent = text;
        el.style.left = `${x}px`; el.style.top = `${y}px`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 700);
      }

      function buySkin(skinId) {
        const skin = skinData[skinId];
        if (!skin || gameState.ownedSkins.includes(skinId) || gameState.balance < skin.cost) return;
        gameState.balance -= skin.cost;
        gameState.ownedSkins.push(skinId);
        notificationHaptic();
        saveGame(); renderSkins(); updateUI();
      }

      function equipSkin(skinId) {
        if (!gameState.ownedSkins.includes(skinId)) return;
        gameState.equippedSkin = skinId;
        gameState.skinMultiplier = skinData[skinId].multiplier;
        saveGame(); updateUI(); renderSkins();
      }

      function buyUpgrade(key) {
        const upg = gameState.upgrades[key];
        if (!upg || upg.owned || gameState.balance < upg.baseCost) return;
        gameState.balance -= upg.baseCost;
        upg.owned = true;
        notificationHaptic();
        saveGame(); renderUpgrades(); updateUI();
      }

      function renderSkins() {
        const container = document.getElementById('skinsContainer');
        container.innerHTML = '';
        for (let [id, skin] of Object.entries(skinData)) {
          const owned = gameState.ownedSkins.includes(id);
          const equipped = gameState.equippedSkin === id;
          const div = document.createElement('div');
          div.className = 'skin-card';
          div.innerHTML = `<div><strong>${skin.emoji} ${skin.name}</strong><br><small>x${skin.multiplier} доход</small></div>
            <div>${equipped ? '<span class="owned-badge">✅ Надет</span>' : (owned ? '<button class="buy-btn equip-btn">Надеть</button>' : `<button class="buy-btn">Купить ${skin.cost} 💰</button>`)}</div>`;
          const btn = div.querySelector('button');
          if (btn && owned && !equipped) btn.addEventListener('click', () => equipSkin(id));
          else if (btn && !owned) btn.addEventListener('click', () => buySkin(id));
          container.appendChild(div);
        }
      }

      function renderUpgrades() {
        const container = document.getElementById('upgradesContainer');
        container.innerHTML = '';
        for (let [key, upg] of Object.entries(gameState.upgrades)) {
          const div = document.createElement('div');
          div.className = 'upgrade-card';
          div.innerHTML = `<div>🛠️ Автобур ${key}<br><small>+${upg.profitPerSec} $Fear/сек</small></div>
            <div>${upg.owned ? '<span class="owned-badge">Активен</span>' : `<button class="buy-btn">Купить ${upg.baseCost} 💰</button>`}</div>`;
          const btn = div.querySelector('button');
          if (btn && !upg.owned) btn.addEventListener('click', () => buyUpgrade(key));
          container.appendChild(div);
        }
      }

      // Реферальная система
      document.getElementById('inviteFriendBtn').addEventListener('click', () => {
        if (tg) {
          const shareText = "⚡ Стань шахтером $Fear вместе со мной! Заходи в Fearless Miner и получай монеты:";
          const shareUrl = `https://t.me/share/url?url=https://t.me/your_bot_username&text=${encodeURIComponent(shareText)}`;
          tg.openTelegramLink(shareUrl);
        } else {
          alert("Реферальная ссылка работает внутри Telegram");
        }
      });

      // Админ проверка
      function checkAdmin() {
        if (!tg?.initDataUnsafe?.user) return;
        const userId = tg.initDataUnsafe.user.id;
        if (userId.toString() === ADMIN_ID.toString()) {
          adminGearBtn.style.display = 'flex';
          adminGearBtn.addEventListener('click', () => {
            adminSheet.classList.toggle('open');
          });
        }
      }

      document.getElementById('adminAdd1M').addEventListener('click', ()=>{
        gameState.balance += 1000000;
        saveGame(); updateUI();
      });
      document.getElementById('adminUnlockSkins').addEventListener('click', ()=>{
        gameState.ownedSkins = Object.keys(skinData);
        saveGame(); renderSkins(); updateUI();
      });
      document.getElementById('adminResetBalance').addEventListener('click', ()=>{
        gameState.balance = 0;
        saveGame(); updateUI();
      });

      function closeAllSheets() {
        skinsSheet.classList.remove('open');
        upgradesSheet.classList.remove('open');
        friendsSheet.classList.remove('open');
        adminSheet.classList.remove('open');
      }

      document.getElementById('tabMine').addEventListener('click', ()=>{
        closeAllSheets();
        document.getElementById('tabMine').classList.add('active');
        document.getElementById('tabSkins').classList.remove('active');
        document.getElementById('tabUpgrades').classList.remove('active');
        document.getElementById('tabFriends').classList.remove('active');
      });
      document.getElementById('tabSkins').addEventListener('click', ()=>{
        closeAllSheets();
        skinsSheet.classList.add('open');
        document.getElementById('tabSkins').classList.add('active');
        document.getElementById('tabMine').classList.remove('active');
        document.getElementById('tabUpgrades').classList.remove('active');
        document.getElementById('tabFriends').classList.remove('active');
        renderSkins();
      });
      document.getElementById('tabUpgrades').addEventListener('click', ()=>{
        closeAllSheets();
        upgradesSheet.classList.add('open');
        document.getElementById('tabUpgrades').classList.add('active');
        document.getElementById('tabMine').classList.remove('active');
        document.getElementById('tabSkins').classList.remove('active');
        document.getElementById('tabFriends').classList.remove('active');
        renderUpgrades();
      });
      document.getElementById('tabFriends').addEventListener('click', ()=>{
        closeAllSheets();
        friendsSheet.classList.add('open');
        document.getElementById('tabFriends').classList.add('active');
        document.getElementById('tabMine').classList.remove('active');
        document.getElementById('tabSkins').classList.remove('active');
        document.getElementById('tabUpgrades').classList.remove('active');
      });

      rockBtn.addEventListener('click', handleMiningClick);
      
      setInterval(() => {
        if (gameState.energy < gameState.maxEnergy) {
          gameState.energy = Math.min(gameState.maxEnergy, gameState.energy + 0.5);
          updateUI(); saveGame();
        }
        const pps = calculateTotalPps();
        if (pps > 0) {
          gameState.balance += pps / 10;
          updateUI(); saveGame();
        }
      }, 100);

      function createDust() {
        const field = document.getElementById('particleField');
        for (let i=0;i<25;i++) {
          const d = document.createElement('div');
          d.className='dust';
          d.style.width=(3+Math.random()*8)+'px';
          d.style.height=d.style.width;
          d.style.left=Math.random()*100+'%';
          d.style.top=Math.random()*100+'%';
          d.style.animationDelay=Math.random()*10+'s';
          field.appendChild(d);
        }
      }

      loadGame(); updateUI(); createDust(); checkAdmin(); renderSkins(); renderUpgrades();
    })();
  </script>
</body>
</html>
