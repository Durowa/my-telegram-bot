<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fearless Miner | $Fear</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: #0b0b0b;
            --gold: #f39c12;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(243, 156, 18, 0.1), transparent);
        }

        #balance {
            font-size: 38px;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
        }

        /* Energy Bar */
        .energy-container { width: 80%; margin: 10px auto; }
        .energy-bar {
            height: 8px; background: #222;
            border-radius: 4px; overflow: hidden;
        }
        #energy-fill {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.2s;
        }

        /* Main Game Area */
        .game-area {
            flex-grow: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }

        #character {
            width: 180px; height: 180px;
            font-size: 100px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        #rock {
            width: 220px; height: 120px;
            background: #333;
            border-radius: 50% / 30%;
            box-shadow: inset 0 -10px 20px #000, 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; top: -30px;
        }

        /* Animations */
        .hit { transform: scale(0.9) translateY(15px); }
        .rock-hit { transform: scale(0.95); }

        .floating-text {
            position: absolute; color: var(--gold); font-weight: bold;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Navigation */
        .nav-bar {
            display: grid; grid-template-columns: repeat(4, 1fr);
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .nav-item {
            padding: 15px 5px; text-align: center; font-size: 12px;
            color: #888; cursor: pointer;
        }

        .nav-item.active { color: var(--gold); font-weight: bold; }

        /* Screens */
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100; display: none;
            padding: 20px; box-sizing: border-box;
        }

        .case-card {
            background: var(--glass); padding: 20px;
            border-radius: 20px; border: 1px solid var(--gold);
            text-align: center; margin-top: 50px;
        }

        #admin-btn {
            position: fixed; top: 10px; right: 10px;
            background: red; border: none; border-radius: 50%;
            width: 30px; height: 30px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="admin-btn" onclick="openAdmin()">⚙️</button>

    <div class="top-bar">
        <div style="font-size: 12px; color: #888;">$Fear Balance</div>
        <div id="balance">0.00</div>
        <div class="energy-container">
            <div style="font-size: 11px; margin-bottom: 4px;">⚡ Энергия: <span id="energy-val">1000</span>/1000</div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div class="game-area" id="mining-screen">
        <div id="character">🦡</div>
        <div id="rock" onclick="handleTap()">
            <div style="font-size: 40px;">💎</div>
        </div>
        <div style="color: #555; margin-top: 20px;" id="current-rank">Worker (x1)</div>
    </div>

    <!-- Case Screen -->
    <div id="case-screen" class="screen">
        <h2>Магазин Кейсов</h2>
        <div class="case-card">
            <div style="font-size: 80px; margin-bottom: 20px;">📦</div>
            <h3>Премиум Кейс</h3>
            <p style="color: #888;">Шанс на Legendary (x100)!</p>
            <button onclick="openCase()" style="background: var(--gold); border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; width: 100%;">Открыть за 1.5M $Fear</button>
        </div>
        <button onclick="closeScreens()" style="margin-top: 20px; width: 100%; background: none; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px;">Назад</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="closeScreens()">⛏️ Mining</div>
        <div class="nav-item" onclick="openScreen('case-screen')">📦 Cases</div>
        <div class="nav-item" onclick="inviteFriends()">👥 Friends</div>
        <div class="nav-item" onclick="alert('Скоро!')">🚀 Airdrop</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ДАННЫЕ (ИЗМЕНИ ID ТУТ) ---
        const ADMIN_ID = 0; // Вставь свой ID

        let balance = parseFloat(localStorage.getItem('fear_balance')) || 0;
        let energy = parseInt(localStorage.getItem('fear_energy')) || 1000;
        let multiplier = parseInt(localStorage.getItem('fear_mult')) || 1;
        let charEmoji = localStorage.getItem('fear_char') || '🦡';

        const characters = [
            { name: 'Common', emoji: '🦡', chance: 70, mult: 1 },
            { name: 'Rare', emoji: '🦊', chance: 20, mult: 5 },
            { name: 'Epic', emoji: '🐼', chance: 8, mult: 25 },
            { name: 'Legendary', emoji: '🤖', chance: 2, mult: 100 }
        ];

        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('energy-val').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy / 1000 * 100) + '%';
            document.getElementById('character').innerText = charEmoji;
            
            if (tg.initDataUnsafe?.user?.id === ADMIN_ID) {
                document.getElementById('admin-btn').style.display = 'block';
            }
        }

        function handleTap() {
            if (energy <= 0) return;

            energy--;
            const profit = 1 * multiplier;
            balance += profit;

            // Animations
            const char = document.getElementById('character');
            const rock = document.getElementById('rock');
            char.classList.add('hit');
            rock.classList.add('rock-hit');
            
            createFloatingText(`+${profit}`);
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                char.classList.remove('hit');
                rock.classList.remove('rock-hit');
            }, 100);

            saveData();
            updateUI();
        }

        function createFloatingText(text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = (window.innerWidth / 2 + (Math.random() * 40 - 20)) + 'px';
            el.style.top = (window.innerHeight / 2) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function openCase() {
            if (balance < 1500000) {
                alert('Нужно 1,500,000 $Fear!');
                return;
            }

            balance -= 1500000;
            const rand = Math.random() * 100;
            let cumulative = 0;
            let win = characters[0];

            for (let c of characters) {
                cumulative += c.chance;
                if (rand <= cumulative) {
                    win = c;
                    break;
                }
            }

            charEmoji = win.emoji;
            multiplier = win.mult;
            alert(`ВЫПАЛ: ${win.name}! Множитель x${win.mult}`);
            
            tg.HapticFeedback.notificationOccurred('success');
            saveData();
            updateUI();
        }

        function saveData() {
            localStorage.setItem('fear_balance', balance);
            localStorage.setItem('fear_energy', energy);
            localStorage.setItem('fear_mult', multiplier);
            localStorage.setItem('fear_char', charEmoji);
        }

        function inviteFriends() {
            const url = `https://t.me{tg.initDataUnsafe?.user?.id || 0}&text=Присоединяйся к моей шахте Fearless Miner!`;
            tg.openLink(url);
        }

        // Energy Regen
        setInterval(() => {
            if (energy < 1000) {
                energy++;
                updateUI();
            }
        }, 1000);

        function openScreen(id) { document.getElementById(id).style.display = 'block'; }
        function closeScreens() { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); }
        
        function openAdmin() {
            let pass = prompt("Админ-действие: 1 - +1.5M монет, 2 - Сброс");
            if (pass == "1") balance += 1500000;
            if (pass == "2") { localStorage.clear(); location.reload(); }
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
