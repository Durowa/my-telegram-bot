<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fearless Miner | $Fear</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #080808;
            --accent: #ffb900;
            --glass: rgba(255, 255, 255, 0.07);
            --text: #ffffff;
            --shadow: rgba(255, 185, 0, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* Фоновое свечение */
        body::before {
            content: ''; position: absolute; top: -10%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px; background: radial-gradient(circle, var(--shadow) 0%, transparent 70%);
            filter: blur(50px); z-index: -1;
        }

        .header { padding: 30px 20px 10px; text-align: center; }

        .balance-container {
            background: var(--glass);
            padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #balance {
            font-size: 42px; font-weight: 900; color: var(--accent);
            text-shadow: 0 0 20px var(--shadow); letter-spacing: -1px;
        }

        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 15px; font-size: 13px; color: #888; }

        /* Game Core */
        .main-stage {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        #badger-container {
            width: 200px; height: 200px; position: relative;
            transition: transform 0.1s; animation: float 3s ease-in-out infinite;
        }

        /* Временный визуальный медоед */
        .badger-placeholder {
            font-size: 120px; text-align: center; line-height: 200px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        #ore {
            width: 250px; height: 80px;
            background: linear-gradient(145deg, #333, #111);
            border-radius: 100px / 40px;
            border: 2px solid #444;
            box-shadow: 0 15px 0 #000, 0 20px 40px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transform: translateY(-20px);
            transition: all 0.05s;
        }

        #ore:active { transform: translateY(-15px); box-shadow: 0 10px 0 #000, 0 15px 30px rgba(0,0,0,0.6); }

        .energy-box { width: 80%; margin: 20px 0; }
        .energy-bar { height: 10px; background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #energy-fill { 
            height: 100%; width: 100%; 
            background: linear-gradient(90deg, #ffb900, #ff7b00); 
            box-shadow: 0 0 10px var(--shadow); transition: width 0.3s;
        }

        /* Bottom Menu */
        .tab-bar {
            display: grid; grid-template-columns: repeat(4, 1fr);
            background: rgba(15,15,15,0.9); border-top: 1px solid #222;
            padding: 10px 0 25px; backdrop-filter: blur(20px);
        }

        .tab { text-align: center; color: #555; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--accent); }
        .tab i { display: block; font-size: 22px; margin-bottom: 5px; font-style: normal; }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .coin-pop {
            position: absolute; color: var(--accent); font-weight: 900;
            pointer-events: none; animation: popUp 0.6s ease-out forwards;
            z-index: 100; font-size: 24px;
        }

        @keyframes popUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.5); opacity: 0; }
        }

        /* Screens */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; padding: 40px 20px;
        }

        .btn-primary {
            background: var(--accent); color: black; border: none;
            padding: 18px; border-radius: 15px; width: 100%;
            font-weight: 800; font-size: 16px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container">
            <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px;">Total Mining $Fear</div>
            <div id="balance">0</div>
        </div>
        <div class="stats">
            <span>⚡ <span id="energy-text">1000</span>/1000</span>
            <span>⛏️ x<span id="mult-text">1</span> Mult</span>
        </div>
    </div>

    <div class="main-stage">
        <div id="badger-container">
            <div class="badger-placeholder" id="hero">🦡</div>
        </div>
        
        <div id="ore" onclick="mine(event)">
            <span style="font-size: 30px;">💎</span>
        </div>

        <div class="energy-box">
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="shop" class="modal">
        <h1 style="text-align: center;">Lootbox</h1>
        <div style="background: var(--glass); padding: 30px; border-radius: 30px; text-align: center; border: 1px solid var(--accent);">
            <div style="font-size: 80px; margin-bottom: 20px;">🎁</div>
            <p>Открой кейс и выбей редкого зверя с множителем до x100!</p>
            <div style="font-size: 24px; font-weight: bold; margin: 15px 0;">1.5M $Fear</div>
            <button class="btn-primary" onclick="buyBox()">КУПИТЬ КЕЙС</button>
        </div>
        <button onclick="closeModal()" style="background: none; border: none; color: #555; width: 100%; margin-top: 20px;">Закрыть</button>
    </div>

    <nav class="tab-bar">
        <div class="tab active"><i>⛏️</i>Mine</div>
        <div class="tab" onclick="openModal()"><i>🎁</i>Box</div>
        <div class="tab" onclick="invite()"><i>👥</i>Friends</div>
        <div class="tab"><i>💰</i>Earn</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#080808';

        let coins = parseFloat(localStorage.getItem('f_c')) || 0;
        let energy = parseInt(localStorage.getItem('f_e')) || 1000;
        let mult = parseInt(localStorage.getItem('f_m')) || 1;
        let skin = localStorage.getItem('f_s') || '🦡';

        function update() {
            document.getElementById('balance').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('energy-text').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy / 10) + '%';
            document.getElementById('mult-text').innerText = mult;
            document.getElementById('hero').innerText = skin;
            localStorage.setItem('f_c', coins);
            localStorage.setItem('f_e', energy);
            localStorage.setItem('f_m', mult);
            localStorage.setItem('f_s', skin);
        }

        function mine(e) {
            if (energy <= 0) return;
            
            energy--;
            coins += (1 * mult);
            
            // Visuals
            const pop = document.createElement('div');
            pop.className = 'coin-pop';
            pop.innerText = `+${1 * mult}`;
            pop.style.left = e.pageX + 'px';
            pop.style.top = e.pageY + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 600);

            const b = document.getElementById('badger-container');
            b.style.transform = 'scale(0.8) translateY(20px)';
            setTimeout(() => b.style.transform = '', 50);

            tg.HapticFeedback.impactOccurred('heavy');
            update();
        }

        function buyBox() {
            if (coins < 1500000) {
                tg.showAlert('Недостаточно $Fear! Нужно 1.5M');
                return;
            }
            coins -= 1500000;
            const r = Math.random() * 100;
            if (r < 2) { skin = '👑'; mult = 100; alert('LEGENDARY! x100'); }
            else if (r < 10) { skin = '🦊'; mult = 25; alert('EPIC! x25'); }
            else if (r < 30) { skin = '🦝'; mult = 5; alert('RARE! x5'); }
            else { skin = '🦡'; mult = 1; alert('Common...'); }
            
            update();
            closeModal();
        }

        setInterval(() => { if(energy < 1000) { energy++; update(); } }, 1500);

        function openModal() { document.getElementById('shop').style.display = 'block'; }
        function closeModal() { document.getElementById('shop').style.display = 'none'; }
        function invite() { tg.openLink('https://t.me лучшим шахтером!'); }

        update();
    </script>
</body>
</html>
